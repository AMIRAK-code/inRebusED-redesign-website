<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Lexend:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A1628;font-family:'Lexend',sans-serif}
  nav{display:flex;align-items:center;justify-content:space-between;padding:0 32px;height:64px;border-bottom:1px solid rgba(255,255,255,0.06);background:#0A1628}
  .logo{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:-0.01em;color:#fff}
  .logo span{color:#F58220}
  .links{display:flex;align-items:center;gap:2px}
  .link{font-size:12px;font-weight:500;color:#6B7480;padding:6px 12px;border-radius:5px;cursor:pointer;letter-spacing:0.01em;text-decoration:none;transition:color 0.2s}
  .link:hover,.link.active{color:#fff}
  .link.active{color:#fff}
  .link-in{color:#F58220;font-weight:700}
  .actions{display:flex;align-items:center;gap:8px}
  .btn-nav{font-size:11px;font-weight:600;padding:7px 16px;border-radius:5px;cursor:pointer;border:none;transition:all 0.2s}
  .btn-ghost-nav{background:transparent;color:#A8ADB5;border:1.5px solid rgba(255,255,255,0.12)}
  .btn-cta-nav{background:#F58220;color:#fff}

  /* Scrolled / alternate light variant */
  .nav-light{background:#F7F7F7;border-bottom:1px solid #E5E5E5;margin-top:2px}
  .nav-light .logo{color:#0A1628}
  .nav-light .link{color:#6B7480}
  .nav-light .link.active{color:#0A1628}
  .nav-light .btn-ghost-nav{border-color:#E5E5E5;color:#202020}
</style></head>
<body>
  <!-- Dark nav -->
  <nav>
    <div class="logo"><span>in</span>Rebus <span style="color:#A8ADB5;font-weight:400;font-size:14px">educational</span></div>
    <div class="links">
      <a class="link link-in active">inVideo</a>
      <a class="link">inSide</a>
      <a class="link">inPractice</a>
      <a class="link">inFacts</a>
      <a class="link">inAction</a>
      <a class="link">inEvolution</a>
    </div>
    <div class="actions">
      <button class="btn-nav btn-ghost-nav">EN / IT</button>
      <button class="btn-nav btn-cta-nav">Contact Us</button>
    </div>
  </nav>
  <!-- Light nav -->
  <nav class="nav-light">
    <div class="logo" style="color:#0A1628"><span>in</span>Rebus <span style="color:#6B7480;font-weight:400;font-size:14px">educational</span></div>
    <div class="links">
      <a class="link" style="color:#6B7480">inVideo</a>
      <a class="link active" style="color:#0A1628;font-weight:600">inPractice</a>
      <a class="link" style="color:#6B7480">inFacts</a>
      <a class="link" style="color:#6B7480">inAction</a>
      <a class="link" style="color:#6B7480">inEvolution</a>
    </div>
    <div class="actions">
      <button class="btn-nav" style="background:transparent;border:1.5px solid #E5E5E5;color:#202020">EN / IT</button>
      <button class="btn-nav btn-cta-nav">Contact Us</button>
    </div>
  </nav>
</body></html>
