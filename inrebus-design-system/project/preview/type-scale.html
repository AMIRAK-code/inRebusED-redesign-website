<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F7F7F7;padding:20px 24px;font-family:'Lexend',sans-serif}
  .row{display:flex;align-items:baseline;gap:16px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #E5E5E5}
  .row:last-child{border-bottom:none}
  .size{font-family:'JetBrains Mono',monospace;font-size:9px;color:#A8ADB5;min-width:36px}
  .sample-disp{font-family:'Barlow Condensed',sans-serif;font-weight:900;text-transform:uppercase;color:#0A1628;line-height:1}
  .sample-body{font-family:'Lexend',sans-serif;font-weight:400;color:#202020;line-height:1.2}
</style></head>
<body>
  <div class="row"><div class="size">120</div><div class="sample-disp" style="font-size:56px">E-Learning</div></div>
  <div class="row"><div class="size">80</div><div class="sample-disp" style="font-size:44px">Outside the Box</div></div>
  <div class="row"><div class="size">64</div><div class="sample-disp" style="font-size:36px">Digital Learning</div></div>
  <div class="row"><div class="size">48</div><div class="sample-disp" style="font-size:28px">Smart Video Solutions</div></div>
  <div class="row"><div class="size">32</div><div class="sample-disp" style="font-size:22px">Instructional Design</div></div>
  <div class="row"><div class="size">24</div><div class="sample-body" style="font-size:18px;font-weight:600">Section heading text</div></div>
  <div class="row"><div class="size">20</div><div class="sample-body" style="font-size:15px;font-weight:500">Lead paragraph or subtitle</div></div>
  <div class="row"><div class="size">16</div><div class="sample-body" style="font-size:13px">Body copy — regular weight, relaxed line height for reading.</div></div>
  <div class="row"><div class="size">14</div><div class="sample-body" style="font-size:11px;color:#6B7480">Small text, captions, meta info</div></div>
  <div class="row"><div class="size">12</div><div class="sample-body" style="font-size:10px;color:#A8ADB5;letter-spacing:0.08em;text-transform:uppercase;font-weight:600">Label / Overline Text</div></div>
</body></html>
