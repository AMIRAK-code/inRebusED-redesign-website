<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F7F7F7;padding:20px;font-family:'Lexend',sans-serif}
  .section{margin-bottom:16px}
  .label{font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#6B7480;margin-bottom:8px}
  .grid{display:flex;flex-wrap:wrap;gap:6px}
  .token{background:#fff;border:1px solid #E5E5E5;border-radius:6px;padding:6px 8px;display:flex;align-items:center;gap:8px}
  .bar{background:#7B2FE0;border-radius:2px;height:12px;flex-shrink:0}
  .name{font-family:'JetBrains Mono',monospace;font-size:9px;color:#0A1628}
  .val{font-family:'JetBrains Mono',monospace;font-size:9px;color:#A8ADB5}
  .radius-grid{display:flex;flex-wrap:wrap;gap:8px}
  .rtoken{background:#fff;border:1px solid #E5E5E5;padding:10px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .rsample{background:#7B2FE0;width:32px;height:32px}
</style></head>
<body>
  <div class="section">
    <div class="label">Spacing Scale</div>
    <div class="grid">
      <div class="token"><div class="bar" style="width:4px"></div><div><div class="name">--space-1</div><div class="val">4px</div></div></div>
      <div class="token"><div class="bar" style="width:8px"></div><div><div class="name">--space-2</div><div class="val">8px</div></div></div>
      <div class="token"><div class="bar" style="width:12px"></div><div><div class="name">--space-3</div><div class="val">12px</div></div></div>
      <div class="token"><div class="bar" style="width:16px"></div><div><div class="name">--space-4</div><div class="val">16px</div></div></div>
      <div class="token"><div class="bar" style="width:20px"></div><div><div class="name">--space-5</div><div class="val">20px</div></div></div>
      <div class="token"><div class="bar" style="width:24px"></div><div><div class="name">--space-6</div><div class="val">24px</div></div></div>
      <div class="token"><div class="bar" style="width:32px"></div><div><div class="name">--space-8</div><div class="val">32px</div></div></div>
      <div class="token"><div class="bar" style="width:40px"></div><div><div class="name">--space-10</div><div class="val">40px</div></div></div>
      <div class="token"><div class="bar" style="width:48px"></div><div><div class="name">--space-12</div><div class="val">48px</div></div></div>
      <div class="token"><div class="bar" style="width:56px"></div><div><div class="name">--space-16</div><div class="val">64px</div></div></div>
    </div>
  </div>
  <div class="section">
    <div class="label">Border Radius</div>
    <div class="radius-grid">
      <div class="rtoken" style="border-radius:6px"><div class="rsample" style="border-radius:2px"></div><div class="name">xs · 2px</div></div>
      <div class="rtoken" style="border-radius:6px"><div class="rsample" style="border-radius:6px"></div><div class="name">sm · 6px</div></div>
      <div class="rtoken" style="border-radius:6px"><div class="rsample" style="border-radius:12px"></div><div class="name">md · 12px</div></div>
      <div class="rtoken" style="border-radius:6px"><div class="rsample" style="border-radius:20px"></div><div class="name">lg · 24px</div></div>
      <div class="rtoken" style="border-radius:6px"><div class="rsample" style="border-radius:999px;width:48px;height:24px"></div><div class="name">full</div></div>
    </div>
  </div>
</body></html>
