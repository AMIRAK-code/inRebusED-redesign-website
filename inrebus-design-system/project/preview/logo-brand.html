<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@900&family=Lexend:wght@400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#F7F7F7;padding:20px;font-family:'Lexend',sans-serif}
  .row{display:flex;gap:16px;margin-bottom:16px}
  .card{flex:1;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:28px;min-height:90px}
  .wordmark{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;text-transform:uppercase;letter-spacing:-0.01em;line-height:1}
  .sub{font-family:'Lexend',sans-serif;font-weight:400;font-size:13px;letter-spacing:0.1em}
  .label{font-size:9px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#6B7480;margin-bottom:8px}
</style></head>
<body>
  <div class="label">Wordmark — Dark Background</div>
  <div class="row">
    <div class="card" style="background:#0A1628">
      <div class="wordmark" style="color:#fff"><span style="color:#F58220">in</span>Rebus <span class="sub" style="color:#6B7480">educational</span></div>
    </div>
    <div class="card" style="background:#202020">
      <div class="wordmark" style="color:#fff"><span style="color:#F58220">in</span>Rebus</div>
    </div>
  </div>
  <div class="label">Wordmark — Light Background</div>
  <div class="row">
    <div class="card" style="background:#FFFFFF;border:1px solid #E5E5E5">
      <div class="wordmark" style="color:#0A1628"><span style="color:#F58220">in</span>Rebus <span class="sub" style="color:#A8ADB5">educational</span></div>
    </div>
    <div class="card" style="background:#F7F7F7;border:1px solid #E5E5E5">
      <div class="wordmark" style="color:#0A1628"><span style="color:#F58220">in</span>Rebus</div>
    </div>
  </div>
  <div class="label">Orange Accent Usage</div>
  <div class="row">
    <div style="background:#F58220;color:#fff;padding:6px 16px;border-radius:5px;font-size:12px;font-weight:700;letter-spacing:0.04em">Get Started</div>
    <div style="color:#F58220;font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;padding:6px 0">inPractice</div>
    <div style="background:rgba(245,130,32,0.12);color:#C8620A;padding:6px 14px;border-radius:4px;font-size:11px;font-weight:600">Smart Video</div>
  </div>
</body></html>
