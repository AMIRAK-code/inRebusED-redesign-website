<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#0A1628;padding:24px 28px;overflow:hidden}
  .label{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#F58220;margin-bottom:4px}
  .d1{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;line-height:1.0;letter-spacing:-0.02em;text-transform:uppercase;color:#fff;margin-bottom:2px}
  .d1 span{color:#F58220}
  .d2{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;line-height:1.05;letter-spacing:-0.02em;text-transform:uppercase;color:#fff;margin-bottom:10px}
  .d3{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;line-height:1.1;text-transform:uppercase;color:#A8ADB5}
  .meta{font-family:'JetBrains Mono',monospace;font-size:9px;color:#333333;margin-top:2px;letter-spacing:0.04em}
</style></head>
<body>
  <div class="label">Display — Barlow Condensed</div>
  <div class="d1">E-Learning<br><span>Outside</span> The Box</div>
  <div class="meta">display-1 · 900 · 72px · −0.02em · uppercase</div>
  <br>
  <div class="d2">Digital Transformation</div>
  <div class="meta">display-2 · 900 · 48px · uppercase</div>
  <br>
  <div class="d3">Instructional Design & LMS</div>
  <div class="meta">h1 · 700 · 32px · uppercase</div>
</body></html>
